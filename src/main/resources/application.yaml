spring:
    mongodb:
      # Prefer an environment-provided URI, but fall back to localhost:27018 explicitly so we don't accidentally connect to the default 27017
      uri: ${MONGODB_URI}
      #database: verfalarm
      ssl:
        enabled: false
      # ensure Spring Data will create indexes defined on entities (CompoundIndex etc.)
      properties:
        autoIndexCreation: true
    data:
      redis:
        database: 0
        url: ${REDIS_URL:redis://localhost:6379}

    ai:
      openai:
        api-key: ${API_KEY}
        base-url: https://openrouter.ai/api

        chat:
          options:
            model: stepfun/step-3.5-flash:free
            max-tokens: 2048

    security:
      oauth2:
        client:
          registration:
            github:
              client-id: ${GITHUB_CLIENT_ID}
              client-secret: ${GITHUB_CLIENT_SECRET}
              scope: user:email, read:user
            google:
              client-id: ${GOOGLE_CLIENT_ID}
              client-secret: ${GOOGLE_CLIENT_SECRET}
              scope: openid, profile, email

app:
  backendBaseUrl: ${BACKEND_BASE_URL:http://localhost:8080}
  frontendBaseUrl: ${FRONTEND_BASE_URL:http://localhost:5173}
  notifications:
    enabled: ${NOTIFICATIONS_ENABLED:true}
    cron: ${NOTIFICATIONS_CRON:0 * * * * *}
    timezone: ${NOTIFICATIONS_TIMEZONE:UTC}
    batchSize: ${NOTIFICATIONS_BATCH_SIZE:200}

  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}

server:
  port: ${SERVER_PORT:8080}

mail:
  from: VERFALARM
